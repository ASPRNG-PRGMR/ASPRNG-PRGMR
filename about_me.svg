<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 445" width="680" height="445">
  <style>
    text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
  </style>

  <!-- background + titlebar -->
