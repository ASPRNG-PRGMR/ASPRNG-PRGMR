  <text x="228" y="358" fill="#ff6b35" font-size="13" text-anchor="middle">Embedded C</text>
  <rect x="282" y="343" width="100" height="22" rx="2" fill="none" stroke="#3d9eff40" stroke-width="1"/>
  <text x="332" y="358" fill="#3d9eff" font-size="13" text-anchor="middle">Real-time OS</text>
  <rect x="390" y="343" width="70"  height="22" rx="2" fill="none" stroke="#ff4da640" stroke-width="1"/>
  <text x="425" y="358" fill="#ff4da6" font-size="13" text-anchor="middle">Edge AI</text>
  <rect x="468" y="343" width="98"  height="22" rx="2" fill="none" stroke="#c8ff5740" stroke-width="1"/>
  <text x="517" y="358" fill="#c8ff57" font-size="13" text-anchor="middle">ESP32 / CAM</text>

  <!-- skills row 2 -->
  <rect x="36"  y="372" width="90"  height="22" rx="2" fill="none" stroke="#00f5d440" stroke-width="1"/>
