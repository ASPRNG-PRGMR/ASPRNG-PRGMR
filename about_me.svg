  <text x="596" y="387" fill="#c8ff57" font-size="13" text-anchor="middle">PID control</text>

  <!-- ls social_links command -->
  <text x="20" y="418" font-size="14.5"><tspan fill="#00f5d4">arnab</tspan><tspan fill="#555">@</tspan><tspan fill="#c8ff57">localhost</tspan><tspan fill="#555">:</tspan><tspan fill="#3d9eff">~</tspan><tspan fill="#c8ff57"> $ </tspan><tspan fill="#ccc">ls </tspan><tspan fill="#ff4da6">social_links</tspan></text>

  <!-- left border line continuing down to bottom -->
  <line x1="28" y1="424" x2="28" y2="445" stroke="#1f1f1f" stroke-width="1"/>

  <!-- border: top + left + right only (no bottom, so it flows into README links) -->
  <!-- top border via titlebar already done; draw left/right/top outline without bottom -->
  <path d="M6,445 L0.5,445 L0.5,6 Q0.5,0.5 6,0.5 L674,0.5 Q679.5,0.5 679.5,6 L679.5,445" fill="none" stroke="#1f1f1f" stroke-width="1"/>
