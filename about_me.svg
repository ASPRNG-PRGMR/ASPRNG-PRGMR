  <!-- whoami -->
  <text x="20" y="62" font-size="14.5"><tspan fill="#00f5d4">arnab</tspan><tspan fill="#555">@</tspan><tspan fill="#c8ff57">localhost</tspan><tspan fill="#555">:</tspan><tspan fill="#3d9eff">~</tspan><tspan fill="#c8ff57"> $ </tspan><tspan fill="#e8e8e8">whoami</tspan></text>
  <line x1="28" y1="68" x2="28" y2="104" stroke="#1f1f1f" stroke-width="1"/>
  <text x="36" y="83" fill="#e8e8e8" font-size="17" font-weight="500" letter-spacing="-0.3">Arnab Ranjan <tspan fill="#c8ff57">Sikdar</tspan></text>
  <text x="36" y="102" fill="#555" font-size="13">systems engineer · edge of hardware &amp; software</text>

  <!-- cat about.txt -->
  <text x="20" y="128" font-size="14.5"><tspan fill="#00f5d4">arnab</tspan><tspan fill="#555">@</tspan><tspan fill="#c8ff57">localhost</tspan><tspan fill="#555">:</tspan><tspan fill="#3d9eff">~</tspan><tspan fill="#c8ff57"> $ </tspan><tspan fill="#ccc">cat </tspan><tspan fill="#ff6b35">about.txt</tspan></text>
  <line x1="28" y1="134" x2="28" y2="192" stroke="#1f1f1f" stroke-width="1"/>
  <text x="36" y="149" fill="#999" font-size="14">I build things that have to work under pressure — schedulers, robots,</text>
  <text x="36" y="167" fill="#999" font-size="14">secure telemetry, and self-hosted infra.</text>
  <text x="36" y="185" fill="#999" font-size="14">Drawn to problems where silent failure isn't an option.</text>

  <!-- cat interests.txt -->
  <text x="20" y="213" font-size="14.5"><tspan fill="#00f5d4">arnab</tspan><tspan fill="#555">@</tspan><tspan fill="#c8ff57">localhost</tspan><tspan fill="#555">:</tspan><tspan fill="#3d9eff">~</tspan><tspan fill="#c8ff57"> $ </tspan><tspan fill="#ccc">cat </tspan><tspan fill="#ff6b35">interests.txt</tspan></text>
  <line x1="28" y1="219" x2="28" y2="310" stroke="#1f1f1f" stroke-width="1"/>
  <text x="36" y="235" font-size="14"><tspan fill="#333">→  </tspan><tspan fill="#ccc">real-time &amp; embedded systems</tspan></text>
  <text x="36" y="253" font-size="14"><tspan fill="#333">→  </tspan><tspan fill="#ccc">edge AI &amp; autonomous robotics</tspan></text>
  <text x="36" y="271" font-size="14"><tspan fill="#333">→  </tspan><tspan fill="#ccc">energy-efficient heterogeneous compute</tspan></text>
  <text x="36" y="289" font-size="14"><tspan fill="#333">→  </tspan><tspan fill="#ccc">secure telemetry &amp; network infrastructure</tspan></text>
  <text x="36" y="307" font-size="14"><tspan fill="#333">→  </tspan><tspan fill="#ccc">self-hosted, cloud-free setups</tspan></text>

