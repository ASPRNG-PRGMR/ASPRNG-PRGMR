  <rect x="134" y="372" width="120" height="22" rx="2" fill="none" stroke="#bf5fff40" stroke-width="1"/>
  <text x="194" y="387" fill="#bf5fff" font-size="13" text-anchor="middle">Linux / systemd</text>
  <rect x="262" y="372" width="66"  height="22" rx="2" fill="none" stroke="#ff6b3540" stroke-width="1"/>
  <text x="295" y="387" fill="#ff6b35" font-size="13" text-anchor="middle">NGINX</text>
  <rect x="336" y="372" width="84"  height="22" rx="2" fill="none" stroke="#3d9eff40" stroke-width="1"/>
