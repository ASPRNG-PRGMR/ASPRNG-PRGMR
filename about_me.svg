  <text x="20" y="333" font-size="14.5"><tspan fill="#00f5d4">arnab</tspan><tspan fill="#555">@</tspan><tspan fill="#c8ff57">localhost</tspan><tspan fill="#555">:</tspan><tspan fill="#3d9eff">~</tspan><tspan fill="#c8ff57"> $ </tspan><tspan fill="#ccc">echo </tspan><tspan fill="#3d9eff">skills</tspan></text>

